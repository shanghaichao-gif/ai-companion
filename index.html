<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="小超">
<meta name="theme-color" content="#1a1a2e">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/icon-192.png">
<title>小超</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #0f0f1a;
  --card: #1a1a2e;
  --accent: #6c63ff;
  --accent-light: #8b83ff;
  --text: #e8e8f0;
  --text-dim: #8888aa;
  --user-bubble: #6c63ff;
  --ai-bubble: #252542;
  --radius: 18px;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}

body {
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "PingFang SC", sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  overflow: hidden;
  -webkit-tap-highlight-color: transparent;
}

/* === 启动画面 === */
#splash {
  position: fixed; inset: 0; z-index: 999;
  background: var(--bg);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  transition: opacity 0.5s;
}
#splash.hide { opacity: 0; pointer-events: none; }
#splash .logo {
  width: 80px; height: 80px; border-radius: 24px;
  background: linear-gradient(135deg, var(--accent), #a855f7);
  display: flex; align-items: center; justify-content: center;
  font-size: 36px; margin-bottom: 16px;
  animation: pulse 2s infinite;
}
#splash h1 { font-size: 24px; font-weight: 700; }
#splash p { color: var(--text-dim); margin-top: 8px; font-size: 14px; }
@keyframes pulse {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.05); }
}

/* === 主布局 === */
#app {
  display: flex; flex-direction: column;
  height: 100vh; height: 100dvh;
  max-width: 600px; margin: 0 auto;
}

/* === 顶栏 === */
header {
  padding: 12px 20px;
  padding-top: calc(12px + env(safe-area-inset-top, 0px));
  background: var(--card);
  display: flex; align-items: center; gap: 12px;
  border-bottom: 1px solid rgba(255,255,255,0.06);
  flex-shrink: 0;
}
header .avatar {
  width: 36px; height: 36px; border-radius: 12px;
  background: linear-gradient(135deg, var(--accent), #a855f7);
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
}
header .info h2 { font-size: 16px; font-weight: 600; }
header .info p { font-size: 11px; color: var(--text-dim); }
header .info p.online::before {
  content: ""; display: inline-block;
  width: 6px; height: 6px; border-radius: 50%;
  background: #22c55e; margin-right: 4px;
}

/* === 消息区 === */
#messages {
  flex: 1; overflow-y: auto;
  padding: 16px 16px 8px;
  scroll-behavior: smooth;
  -webkit-overflow-scrolling: touch;
}

.msg {
  display: flex; gap: 8px; margin-bottom: 12px;
  animation: fadeIn 0.3s;
}
.msg.user { flex-direction: row-reverse; }

.msg .bubble {
  max-width: 80%; padding: 10px 14px;
  border-radius: var(--radius);
  font-size: 15px; line-height: 1.5;
  word-break: break-word;
}
.msg.ai .bubble {
  background: var(--ai-bubble);
  border-bottom-left-radius: 4px;
}
.msg.user .bubble {
  background: var(--user-bubble);
  border-bottom-right-radius: 4px;
  color: #fff;
}
.msg .time {
  font-size: 10px; color: var(--text-dim);
  align-self: flex-end; margin-bottom: 2px;
  flex-shrink: 0;
}

.typing-indicator .bubble {
  display: flex; gap: 4px; padding: 14px 18px;
}
.typing-indicator .dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--text-dim);
  animation: typing 1.4s infinite;
}
.typing-indicator .dot:nth-child(2) { animation-delay: 0.2s; }
.typing-indicator .dot:nth-child(3) { animation-delay: 0.4s; }

@keyframes typing {
  0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
  30% { transform: translateY(-4px); opacity: 1; }
}
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

/* === 输入区 === */
#input-area {
  padding: 10px 16px;
  padding-bottom: calc(10px + var(--safe-bottom));
  background: var(--card);
  border-top: 1px solid rgba(255,255,255,0.06);
  display: flex; align-items: flex-end; gap: 8px;
  flex-shrink: 0;
}

#input-area textarea {
  flex: 1; resize: none;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 20px;
  padding: 10px 16px;
  color: var(--text); font-size: 15px;
  font-family: inherit;
  outline: none;
  max-height: 100px;
  line-height: 1.4;
}
#input-area textarea:focus {
  border-color: var(--accent);
}
#input-area textarea::placeholder {
  color: var(--text-dim);
}

.icon-btn {
  width: 42px; height: 42px; border-radius: 50%;
  border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; flex-shrink: 0;
  transition: all 0.2s;
}

#voice-btn {
  background: rgba(255,255,255,0.06);
  color: var(--text);
}
#voice-btn.recording {
  background: #ef4444;
  color: #fff;
  animation: recordPulse 1s infinite;
}
@keyframes recordPulse {
  0%, 100% { box-shadow: 0 0 0 0 rgba(239,68,68,0.4); }
  50% { box-shadow: 0 0 0 10px rgba(239,68,68,0); }
}

#send-btn {
  background: var(--accent);
  color: #fff;
}
#send-btn:disabled {
  opacity: 0.3;
  cursor: default;
}

/* === 通知 Toast === */
.toast {
  position: fixed; top: 60px; left: 50%; transform: translateX(-50%);
  background: var(--card); border: 1px solid var(--accent);
  border-radius: 12px; padding: 10px 20px;
  font-size: 13px; z-index: 100;
  animation: toastIn 0.3s, toastOut 0.3s 2.7s forwards;
}
@keyframes toastIn { from { opacity: 0; transform: translateX(-50%) translateY(-10px); } }
@keyframes toastOut { to { opacity: 0; transform: translateX(-50%) translateY(-10px); } }
</style>
</head>
<body>

<!-- 启动画面 -->
<div id="splash">
  <div class="logo">🤖</div>
  <h1>小超</h1>
  <p>你的AI搭档，越用越懂你</p>
</div>

<!-- 主界面 -->
<div id="app">
  <header>
    <div class="avatar">🤖</div>
    <div class="info">
      <h2>小超</h2>
      <p class="online">在线</p>
    </div>
  </header>

  <div id="messages"></div>

  <div id="input-area">
    <button id="voice-btn" class="icon-btn" title="语音输入">🎤</button>
    <textarea id="msg-input" rows="1" placeholder="说点什么..."></textarea>
    <button id="send-btn" class="icon-btn" disabled title="发送">➤</button>
  </div>
</div>

<script>
// ====== 全局状态 ======
const state = {
  messages: [],
  isRecording: false,
  recognition: null,
  currentAudio: null,
};

// ====== DOM ======
const $messages = document.getElementById('messages');
const $input = document.getElementById('msg-input');
const $sendBtn = document.getElementById('send-btn');
const $voiceBtn = document.getElementById('voice-btn');
const $splash = document.getElementById('splash');

// ====== 初始化 ======
window.addEventListener('load', () => {
  setTimeout(() => $splash.classList.add('hide'), 1200);
  loadHistory();
  initVoice();
  autoResize();
  // 注册 Service Worker
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js').catch(() => {});
  }
  // 请求通知权限
  if ('Notification' in window && Notification.permission === 'default') {
    Notification.requestPermission();
  }
});

// ====== 消息 ======
function addMessage(role, text, save = true) {
  const now = new Date();
  const timeStr = `${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}`;
  const msg = { role, text, time: timeStr };
  state.messages.push(msg);
  if (save) saveHistory();
  renderMessage(msg);
}

function renderMessage(msg) {
  const div = document.createElement('div');
  div.className = `msg ${msg.role === 'user' ? 'user' : 'ai'}`;
  div.innerHTML = `
    <div class="bubble">${escapeHtml(msg.text)}</div>
    <div class="time">${msg.time}</div>
  `;
  $messages.appendChild(div);
  scrollToBottom();
}

function showTyping() {
  const div = document.createElement('div');
  div.className = 'msg ai typing-indicator';
  div.id = 'typing';
  div.innerHTML = `<div class="bubble"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`;
  $messages.appendChild(div);
  scrollToBottom();
}

function hideTyping() {
  document.getElementById('typing')?.remove();
}

function scrollToBottom() {
  setTimeout(() => $messages.scrollTop = $messages.scrollHeight, 50);
}

function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}

// ====== 发送消息 ======
async function sendMessage(text) {
  if (!text.trim()) return;
  addMessage('user', text.trim());
  $input.value = '';
  autoResize();
  $sendBtn.disabled = true;
  showTyping();

  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text.trim() }),
    });
    const data = await res.json();
    hideTyping();
    if (data.reply) {
      addMessage('ai', data.reply);
    } else if (data.error) {
      addMessage('ai', '⚠️ ' + data.error);
    }
  } catch (e) {
    hideTyping();
    addMessage('ai', '❌ 网络连接失败，请检查服务器');
  }
}

// ====== 语音 ======
function initVoice() {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) {
    $voiceBtn.style.display = 'none';
    return;
  }
  state.recognition = new SpeechRecognition();
  state.recognition.lang = 'zh-CN';
  state.recognition.continuous = false;
  state.recognition.interimResults = true;

  state.recognition.onresult = (e) => {
    let final = '', interim = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      if (e.results[i].isFinal) final += e.results[i][0].transcript;
      else interim += e.results[i][0].transcript;
    }
    $input.value = final || interim;
    autoResize();
    $sendBtn.disabled = !final && !interim;
  };

  state.recognition.onend = () => {
    state.isRecording = false;
    $voiceBtn.classList.remove('recording');
    // 如果有内容，自动发送
    if ($input.value.trim()) sendMessage($input.value);
  };

  state.recognition.onerror = () => {
    state.isRecording = false;
    $voiceBtn.classList.remove('recording');
  };
}

function toggleVoice() {
  if (!state.recognition) return;
  if (state.isRecording) {
    state.recognition.stop();
  } else {
    state.isRecording = true;
    $voiceBtn.classList.add('recording');
    $input.value = '';
    $input.placeholder = '正在听...';
    state.recognition.start();
    setTimeout(() => {
      $input.placeholder = '说点什么...';
    }, 5000);
  }
}

// ====== 本地存储 ======
function saveHistory() {
  try {
    const recent = state.messages.slice(-100);
    localStorage.setItem('xiaochao_history', JSON.stringify(recent));
  } catch(e) {}
}

function loadHistory() {
  try {
    const saved = localStorage.getItem('xiaochao_history');
    if (saved) {
      const msgs = JSON.parse(saved);
      state.messages = msgs;
      msgs.forEach(renderMessage);
    }
  } catch(e) {}
}

// ====== 事件 ======
$input.addEventListener('input', () => {
  autoResize();
  $sendBtn.disabled = !$input.value.trim();
});

$input.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage($input.value);
  }
});

$sendBtn.addEventListener('click', () => sendMessage($input.value));
$voiceBtn.addEventListener('click', toggleVoice);

function autoResize() {
  $input.style.height = 'auto';
  $input.style.height = Math.min($input.scrollHeight, 100) + 'px';
}
</script>
</body>
</html>
